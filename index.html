<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球古文字AI破译实验室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", "PingFang SC", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #f8fafc;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #38bdf8, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }
        .upload-area {
            border: 2px dashed #475569;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-area:hover {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
        }
        .upload-icon {
            font-size: 4rem;
            color: #64748b;
            margin-bottom: 20px;
        }
        .upload-text {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 15px;
        }
        .upload-hint {
            font-size: 0.9rem;
            color: #94a3b8;
        }
        #file-input {
            display: none;
        }
        .btn {
            background: linear-gradient(90deg, #38bdf8, #2563eb);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px 5px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4);
        }
        .btn:disabled {
            background: #64748b;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .result-area {
            margin-top: 40px;
            padding: 20px;
            background: rgba(15, 23, 42, 0.8);
            border-radius: 12px;
            display: none;
        }
        .result-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #38bdf8;
        }
        .result-content {
            font-size: 1.1rem;
            line-height: 1.8;
            white-space: pre-wrap;
            color: #e2e8f0;
        }
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        .loading-spinner {
            border: 4px solid rgba(56, 189, 248, 0.2);
            border-top: 4px solid #38bdf8;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .preview-image {
            max-width: 300px;
            max-height: 300px;
            margin: 20px auto;
            border-radius: 8px;
            display: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            .container {
                padding: 20px;
            }
            .upload-area {
                padding: 40px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>全球古文字AI破译实验室</h1>
            <p class="subtitle">上传古文字图片，AI 一键破译（甲骨文/金文/小篆/楔形文字/象形文字）</p>
        </header>

        <div class="upload-area" id="upload-area">
            <div class="upload-icon">📤</div>
            <p class="upload-text">点击或拖拽上传古文字图片</p>
            <p class="upload-hint">支持 JPG、PNG、WEBP 格式，单张不超过 10MB</p>
            <input type="file" id="file-input" accept="image/*">
        </div>

        <div style="text-align: center;">
            <button class="btn" id="decipher-btn" disabled>开始 AI 破译</button>
            <button class="btn" id="reset-btn">重置</button>
        </div>

        <img id="preview-img" class="preview-image" alt="预览图片">

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>AI 正在解析古文字，请稍候...</p>
        </div>

        <div class="result-area" id="result-area">
            <h2 class="result-title">破译结果</h2>
            <div class="result-content" id="result-content"></div>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const decipherBtn = document.getElementById('decipher-btn');
        const resetBtn = document.getElementById('reset-btn');
        const previewImg = document.getElementById('preview-img');
        const loading = document.getElementById('loading');
        const resultArea = document.getElementById('result-area');
        const resultContent = document.getElementById('result-content');
        
        let selectedFile = null;

        // 上传区域点击触发文件选择
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // 拖拽上传
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#38bdf8';
            uploadArea.style.background = 'rgba(56, 189, 248, 0.1)';
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '#475569';
            uploadArea.style.background = 'transparent';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#475569';
            uploadArea.style.background = 'transparent';
            
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // 文件选择处理
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                handleFile(fileInput.files[0]);
            }
        });

        // 处理选中的文件
        function handleFile(file) {
            // 验证文件类型
            if (!file.type.startsWith('image/')) {
                alert('请上传图片文件！');
                return;
            }

            // 验证文件大小
            if (file.size > 10 * 1024 * 1024) {
                alert('文件大小不能超过 10MB！');
                return;
            }

            selectedFile = file;
            decipherBtn.disabled = false;

            // 显示预览图片
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                previewImg.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        // 破译按钮点击事件
        decipherBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            // 显示加载状态
            loading.style.display = 'block';
            decipherBtn.disabled = true;
            resultArea.style.display = 'none';

            try {
                // 创建FormData
                const fd = new FormData();
                fd.append('image', selectedFile);
                
                // 调用API（关键修改：api → API）
                const response = await fetch('/API/decipher', {
                    method: 'POST',
                    body: fd
                });

                if (!response.ok) {
                    throw new Error(`HTTP 错误！状态码：${response.status}`);
                }

                const result = await response.json();

                // 显示结果
                loading.style.display = 'none';
                resultArea.style.display = 'block';
                
                if (result.code === 200) {
                    resultContent.textContent = result.data.text;
                } else {
                    resultContent.textContent = `解析失败：${result.message}`;
                }

            } catch (error) {
                loading.style.display = 'none';
                resultArea.style.display = 'block';
                resultContent.textContent = `请求失败：${error.message}`;
                decipherBtn.disabled = false;
            }
        });

        // 重置按钮点击事件
        resetBtn.addEventListener('click', () => {
            selectedFile = null;
            fileInput.value = '';
            decipherBtn.disabled = true;
            
            previewImg.style.display = 'none';
            loading.style.display = 'none';
            resultArea.style.display = 'none';
            resultContent.textContent = '';
        });
    </script>
</body>
</html>
